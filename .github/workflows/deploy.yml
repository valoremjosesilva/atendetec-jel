name: Deploy

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/api
  WEB_IMAGE: ${{ github.repository }}/web

jobs:
  build-push-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Atendefy.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-push-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: src/Atendefy.Web
          file: src/Atendefy.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: [build-push-api, build-push-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Mantém o docker-compose.yml da VM em sincronia com o repo (a VM não é git).
      # Sem isso, mudanças no compose (novas envs etc.) nunca chegam à produção.
      - name: Copy compose to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: infra/docker-compose.yml
          target: /opt/atendefy/
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/atendefy
            TAG=${{ github.ref_name }}
            VERSION=${TAG#v}
            # Persiste a versão no .env para que um `docker compose up` manual
            # depois não regrida a imagem para :latest.
            if grep -q '^API_VERSION=' .env; then sed -i "s/^API_VERSION=.*/API_VERSION=${VERSION}/" .env; else echo "API_VERSION=${VERSION}" >> .env; fi
            if grep -q '^WEB_VERSION=' .env; then sed -i "s/^WEB_VERSION=.*/WEB_VERSION=${VERSION}/" .env; else echo "WEB_VERSION=${VERSION}" >> .env; fi
            export API_IMAGE=ghcr.io/${{ github.repository }}/api
            export WEB_IMAGE=ghcr.io/${{ github.repository }}/web
            docker compose pull atendefy-api atendefy-web
            docker compose up -d atendefy-api atendefy-web
            docker image prune -f
