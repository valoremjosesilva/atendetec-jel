services:
  caddy:
    image: caddy:2-alpine
    profiles: [production]
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - atendefy

  atendefy-api:
    image: ${API_IMAGE:-ghcr.io/atendefy/api}:${API_VERSION:-latest}
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Postgres=${POSTGRES_CONNECTION}
      - ConnectionStrings__Redis=${REDIS_CONNECTION}
      - Jwt__Secret=${JWT_SECRET}
      - Encryption__Key=${ENCRYPTION_KEY}
      - App__BaseDomain=${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atendefy

  atendefy-web:
    image: ${WEB_IMAGE:-ghcr.io/atendefy/web}:${WEB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - atendefy-api
    networks:
      - atendefy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: atendefy
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d atendefy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atendefy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atendefy

  evolution-api:
    image: atendai/evolution-api:latest
    profiles: [production]
    restart: unless-stopped
    environment:
      - SERVER_URL=https://evolution.${DOMAIN}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=false
    networks:
      - atendefy

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    networks:
      - atendefy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  uptime_data:

networks:
  atendefy:
    driver: bridge
