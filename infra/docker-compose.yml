services:
  caddy:
    image: caddy:2-alpine
    profiles: [production]
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - atendefy

  atendefy-api:
    image: ${API_IMAGE:-ghcr.io/atendefy/api}:${API_VERSION:-latest}
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Postgres=${POSTGRES_CONNECTION}
      - ConnectionStrings__Redis=${REDIS_CONNECTION}
      - Jwt__Secret=${JWT_SECRET}
      - Encryption__Key=${ENCRYPTION_KEY}
      - App__BaseDomain=${DOMAIN}
      - Evolution__BaseUrl=http://evolution-api:8080
      - Evolution__ApiKey=${EVOLUTION_API_KEY}
      # Provider "openai" aponta para qualquer API compatível com OpenAI.
      # Default = Gemini (free tier); sobrescreva com AI_OPENAI_BASE_URL no .env.
      # A API key é cadastrada no painel de IA do app, não aqui.
      - AI__OpenAiBaseUrl=${AI_OPENAI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
      # Meta WhatsApp Cloud API: App Secret (valida assinatura do webhook) e
      # Verify Token (handshake GET do webhook). Defina ambos no .env da VM.
      - Meta__AppSecret=${META_APP_SECRET:-}
      - Meta__WebhookVerifyToken=${META_WEBHOOK_VERIFY_TOKEN:-}
      # Chave de admin p/ aprovar empresas (POST /tenants/{sub}/activate via header X-Admin-Key).
      # Vazio = endpoints admin desativados. Defina ADMIN_KEY no .env da VM.
      - Admin__Key=${ADMIN_KEY:-}
      # Anti-abuso do cadastro anônimo. Vazio = captcha desativado (NÃO recomendado em prod).
      - Turnstile__SecretKey=${TURNSTILE_SECRET_KEY:-}
      # SMTP para o e-mail de verificação de cadastro. Vazio = não envia (apenas loga).
      - Email__SmtpHost=${EMAIL_SMTP_HOST:-}
      - Email__SmtpPort=${EMAIL_SMTP_PORT:-587}
      - Email__SmtpUser=${EMAIL_SMTP_USER:-}
      - Email__SmtpPassword=${EMAIL_SMTP_PASSWORD:-}
      - Email__FromAddress=${EMAIL_FROM_ADDRESS:-}
      - Email__FromName=${EMAIL_FROM_NAME:-Mensagee}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atendefy

  atendefy-web:
    image: ${WEB_IMAGE:-ghcr.io/atendefy/web}:${WEB_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - atendefy-api
    networks:
      - atendefy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: atendefy
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d atendefy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atendefy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atendefy

  evolution-api:
    # Versao fixada: Baileys e frágil e um pull de :latest pode quebrar o QR code.
    # v2.2.3 = digest da imagem que roda em produção. Não subir de versão sem testar QR.
    image: atendai/evolution-api:v2.2.3
    profiles: [production]
    restart: unless-stopped
    environment:
      - SERVER_URL=https://evolution.${DOMAIN}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      # Versao do WhatsApp Web que o Baileys anuncia. O default da imagem fica
      # desatualizado e o WhatsApp fecha o socket antes do QR. Atualizar quando o QR
      # voltar a falhar (https://raw.githubusercontent.com/WhiskeySockets/Baileys/master/src/Defaults/baileys-version.json).
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035194821
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atendefy

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    networks:
      - atendefy

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  uptime_data:

networks:
  atendefy:
    driver: bridge
