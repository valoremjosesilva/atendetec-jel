services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  atendefy-api:
    build:
      context: ..
      dockerfile: src/Atendefy.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"
    volumes:
      - ../logs:/app/logs

  atendefy-web:
    build:
      context: ../src/Atendefy.Web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - atendefy-api

  evolution-api:
    profiles: !reset []
    ports:
      - "8081:8080"
    environment:
      - SERVER_URL=http://host.docker.internal:8081
      - AUTHENTICATION_API_KEY=dev_evolution_key
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://atendefy:change_me_strong_password@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
