services:
  postgres:
    ports:
      - "5434:5432"

  redis:
    ports:
      - "6381:6379"

  atendefy-api:
    build:
      context: ..
      dockerfile: src/Atendefy.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Evolution__BaseUrl=http://evolution-api:8080
      - Evolution__ApiKey=dev_evolution_key
      # Provider "openai" aponta para qualquer API compatível com OpenAI.
      # Default = Gemini (free tier). Para usar a OpenAI/Groq/OpenRouter, defina
      # AI_OPENAI_BASE_URL no .env. A API key NÃO fica aqui — é cadastrada no
      # painel de IA do app (Provider: openai, Model: gemini-2.0-flash).
      - AI__OpenAiBaseUrl=${AI_OPENAI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/chat/completions}
    ports:
      - "8084:8080"
    volumes:
      - ../logs:/app/logs

  atendefy-web:
    build:
      context: ../src/Atendefy.Web
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - atendefy-api

  evolution-api:
    profiles: !reset []
    ports:
      - "8085:8080"
    environment:
      - SERVER_URL=http://host.docker.internal:8081
      - AUTHENTICATION_API_KEY=dev_evolution_key
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://atendefy:change_me_strong_password@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      # WhatsApp Web version Baileys advertises. The image default (2.3000.1015901307)
      # is outdated and WhatsApp now closes the socket before a QR is emitted, so the
      # instance crash-loops and /instance/connect returns {count:0}. Keep this current
      # (see https://raw.githubusercontent.com/WhiskeySockets/Baileys/master/src/Defaults/baileys-version.json).
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1035194821
    depends_on:
      postgres:
        condition: service_healthy
