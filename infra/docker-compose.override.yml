services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  atendefy-api:
    build:
      context: ..
      dockerfile: src/Atendefy.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "8080:8080"
    volumes:
      - ../logs:/app/logs

  atendefy-web:
    build:
      context: ../src/Atendefy.Web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - atendefy-api
